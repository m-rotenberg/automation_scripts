name: NetSuite to Snowflake

on:
  schedule:
    - cron: "0 9 * * *"  # daily at 09:00 UTC — adjust as needed
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --no-ansi
        working-directory: snowflake

      - name: Run NetSuite to Snowflake pipeline
        env:
          NS_REALM_ID:     ${{ secrets.NS_REALM_ID }}
          NS_COMPANY_ID:   ${{ secrets.NS_COMPANY_ID }}
          NS_CLIENT_KEY:   ${{ secrets.NS_CLIENT_KEY }}
          NS_CLIENT_SECRET: ${{ secrets.NS_CLIENT_SECRET }}
          NS_TOKEN_ID:     ${{ secrets.NS_TOKEN_ID }}
          NS_TOKEN_SECRET: ${{ secrets.NS_TOKEN_SECRET }}
          SNOWFLAKE_USER:               ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ACCOUNT:            ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PRIVATE_KEY_BASE64: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_BASE64 }}
          SNOWFLAKE_WAREHOUSE:          ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE:           ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_ROLE:               ${{ secrets.SNOWFLAKE_ROLE }}
        run: poetry run python netsuite_to_snowflake_public.py
        working-directory: snowflake
