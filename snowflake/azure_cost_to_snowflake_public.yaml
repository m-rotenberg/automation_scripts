name: Azure Cost to Snowflake

on:
  schedule:
    # 08:00 UTC daily — fetches current-month-to-date usage details for all
    # configured Azure subscriptions and loads them into Snowflake.
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --no-ansi
        working-directory: snowflake

      - name: Run Azure Cost to Snowflake
        env:
          TENANT_ID:            ${{ secrets.AZURE_TENANT_ID }}
          CLIENT_ID:            ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET:        ${{ secrets.AZURE_CLIENT_SECRET }}
          DEV_SUBSCRIPTION_ID:  ${{ secrets.AZURE_DEV_SUBSCRIPTION_ID }}
          PROD_SUBSCRIPTION_ID: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
          SNOWFLAKE_USER:               ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ACCOUNT:            ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PRIVATE_KEY_BASE64: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_BASE64 }}
          SNOWFLAKE_WAREHOUSE:          ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE:           ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_ROLE:               ${{ secrets.SNOWFLAKE_ROLE }}
        run: poetry run python azure_cost_to_snowflake_public.py
        working-directory: snowflake
