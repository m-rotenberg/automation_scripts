name: Salesforce to Snowflake

on:
  schedule:
    - cron: "0 8 * * *"  # daily at 08:00 UTC — adjust as needed
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: poetry install --no-root --no-interaction --no-ansi
        working-directory: snowflake

      - name: Run Salesforce to Snowflake pipeline
        env:
          SF_USERNAME:           ${{ secrets.SF_USERNAME }}
          SF_CONSUMER_KEY:       ${{ secrets.SF_CONSUMER_KEY }}
          SF_PRIVATE_KEY_BASE64: ${{ secrets.SF_PRIVATE_KEY_BASE64 }}
          SF_DOMAIN:             ${{ secrets.SF_DOMAIN }}
          SNOWFLAKE_USER:               ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ACCOUNT:            ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_PRIVATE_KEY_BASE64: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_BASE64 }}
          SNOWFLAKE_WAREHOUSE:          ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE:           ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_ROLE:               ${{ secrets.SNOWFLAKE_ROLE }}
        run: poetry run python salesforce_to_snowflake_public.py
        working-directory: snowflake
